# docker-compose.dev.yml
# ──────────────────────────────────────────────────────────────────────
# Development-only services.  Backend + Frontend run on the host.
# Start with:  docker compose -f docker-compose.dev.yml up -d
# ──────────────────────────────────────────────────────────────────────

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: mdg-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mdg_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdg_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mdg_dashboard}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdg_admin} -d ${POSTGRES_DB:-mdg_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-dev-data:

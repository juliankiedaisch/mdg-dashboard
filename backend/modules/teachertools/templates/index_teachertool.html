<div id="teachertools-content">
    <div id="teachertools-title">Tools für den Unterricht</div>
    <div id="teachertools-messages">
        <h2>QR-Code erstellen</h2>
        <div class="teachertools-message-box" style="display: none;" id="teachertools-qr-message-box"></div> 
        <form onsubmit="event.preventDefault();" class="teachertools-form" enctype="multipart/form-data" id="teachertools-qr-form">
            <p class="anmerkung">Url für den QR-Code:</p>
        
            <input type="text" id="teachertools_qr_url">
            <button id="teachertools_qr_submit">QR Code erstellen</button>
        </form>
    </div>
    <div id="teachertools-qr-modal" class="teachertools-qr-modal" tabindex="-1">
        <div id="teachertools-qr-modal-content" class="teachertools-qr-modal-content" role="dialog">
            <header>
                <span class="teachertools-qr-title">QR Code</span>
                <span id="teachertools-qr-close" class="teachertools-qr-close" role="button" tabindex="-1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" width="24px" height="24px"><path d="M0 0h24v24H0z" fill="none"/><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </span>
            </header>

            <div class="teachertools-qr-modal-background">
                <div class="teachertools-qr-modal-inner-content">
                    <div id="teachertools-qr-code"></div>
                    <div class="teachertools-qr-colors">
                        <span class="teachertools-qr-color black" role="button" tabindex="-1" data-color="#001d1d"></span>
                        <span class="teachertools-qr-color blue" role="button" tabindex="-1" data-color="#00ced1"></span>
                        <span class="teachertools-qr-color red" role="button" tabindex="-1" data-color="#ff2d55"></span>
                        <span class="teachertools-qr-color green" role="button" tabindex="-1" data-color="#47ba7a"></span>
                        <span id="teachertools-qr-color-selection" role="button" tabindex="-1" title="Farbe auswählen">
                            <label for="teachertools-qr-color"><svg xmlns="http://www.w3.org/2000/svg" height="36px" viewBox="0 0 24 24" width="36px" fill="#000000"><path d="M0 0h24v24H0z" fill="none"/><path d="M20.71 5.63l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-3.12 3.12-1.93-1.91-1.41 1.41 1.42 1.42L3 16.25V21h4.75l8.92-8.92 1.42 1.42 1.41-1.41-1.92-1.92 3.12-3.12c.4-.4.4-1.03.01-1.42zM6.92 19L5 17.08l8.06-8.06 1.92 1.92L6.92 19z"/></svg></label>
                            <input type="color" id="teachertools-qr-color" value="#001d1d"></span>
                        </span>
                        <span id="teachertools-qr-image-selection" role="button" tabindex="-1" title="Bild in der Mitte auswählen">
                            <label for="teachertools-qr-image"><svg xmlns="http://www.w3.org/2000/svg" height="36px" viewBox="0 0 24 24" width="36px" fill="#000000"><path d="M0 0h24v24H0z" fill="none"/><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg></label>
                            <input type="file" id="teachertools-qr-image" accept=".png, .jpeg, .jpg, .gif">
                        </span>
                        <span id="teachertools-qr-image-remove" role="button" tabindex="-1" title="Bild entfernen">
                            <svg xmlns="http://www.w3.org/2000/svg" height="36px" viewBox="0 0 24 24" width="36px" fill="#ff6259"><path d="M0 0h24v24H0z" fill="none"/><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                        </span>
                    </div>
                    <div class="teachertools-qr-actions">
                        <button id="teachertools-qr-download-submit" tabindex="-1">Download</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

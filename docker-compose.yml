services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mdg-backend
    ports:
      - "5000:5000"
    volumes:
      - ./production/db:/app/db
      - ./production/flask_session:/app/flask_session
      - ./production/static:/app/static
      - ./production/assistant_docs:/app/assistant_docs
    env_file:
      - .env-production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - mdg-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_HOST=dashboard.hub.mdg-hamburg.de
        - BACKEND_PORT=443
        - FRONTEND_HOST=dashboard.hub.mdg-hamburg.de
        - FRONTEND_PORT=443
        - PRODUCTION=True
    container_name: mdg-frontend
    env_file:
      - .env-production
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mdg-network

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mdg-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mdg_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdg_secure_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-mdg_dashboard}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdg_admin} -d ${POSTGRES_DB:-mdg_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - mdg-network


networks:
  mdg-network:
    driver: bridge